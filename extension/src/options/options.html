<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Phoenix Shield Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Phoenix Shield Settings</h1>

    <section class="section">
      <h2>EDR Agent Connection</h2>
      <div class="form-group">
        <label for="agent-url">Agent URL</label>
        <input type="text" id="agent-url" placeholder="http://localhost:8745/api">
        <span class="status" id="connection-status">Checking...</span>
      </div>
    </section>

    <section class="section">
      <h2>Modules</h2>
      <div id="module-toggles"></div>
    </section>

    <section class="section">
      <h2>Policy</h2>
      <div class="info-row">
        <span>Policy Version:</span>
        <span id="policy-version">-</span>
      </div>
      <div class="info-row">
        <span>Last Sync:</span>
        <span id="policy-sync">-</span>
      </div>
      <button id="sync-policy" class="btn">Sync Policy Now</button>
    </section>

    <section class="section">
      <h2>Forensic Logs</h2>
      <div class="info-row">
        <span>Log Entries:</span>
        <span id="log-count">-</span>
      </div>
      <button id="export-logs" class="btn">Export Logs</button>
      <button id="clear-logs" class="btn btn-danger">Clear Logs</button>
    </section>

    <div class="save-bar">
      <button id="save-btn" class="btn btn-primary">Save Settings</button>
      <span id="save-status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
